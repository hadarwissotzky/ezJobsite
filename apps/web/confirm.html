<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Please confirm</title>
<!--
  The no-login confirmation page — REQ-VAL1/2/3/8.

  WHO IS READING THIS: a homeowner or a GC standing in a doorway, on their own
  phone, who has never heard of this app and will never make an account for it.
  They tapped a link a contractor texted them. If this page asks them to sign up,
  install anything, or work out what a "disposition" is, the contractor does not
  get their answer and the job stops. REQ-VAL3's no-login rule is not a
  convenience -- it is the only reason this loop closes at all.

  WHY THIS IS A STATIC FILE IN A STORAGE BUCKET, and not an Edge Function:
  the page is inert. Every value it displays comes from confirmation_fetch(token),
  which is already granted to anon. There is no server logic to host, so hosting a
  server would be adding a moving part to run zero code.

  THE ANON KEY IS PUBLIC BY DESIGN. It is not a secret and never was: it
  identifies the project, and RLS plus the RPC grants are what actually protect
  the data. anon can reach exactly two functions and no table.

  THE TOKEN IS THE CREDENTIAL. Stated plainly rather than dressed up: whoever
  holds the link can answer. That is the trade REQ-VAL3 makes deliberately, and
  the bundle's limitations section says so out loud rather than implying more.
-->
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font: 17px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0; padding: 24px 18px 48px; max-width: 560px; margin-inline: auto;
    background: #fff; color: #111;
  }
  @media (prefers-color-scheme: dark) { body { background: #0d1117; color: #e6edf3; } }

  .who { font-size: 14px; color: #6a737d; margin-bottom: 4px; }
  h1 { font-size: 21px; margin: 0 0 18px; line-height: 1.3; }

  /* The frozen text, presented as a quotation of what was sent. Monospace-ish
     and boxed so it reads as a fixed document, not as app chrome that might
     change under them. */
  .card {
    white-space: pre-wrap; background: #f6f8fa; border: 1px solid #d8dee4;
    border-radius: 12px; padding: 18px; font-size: 17px; line-height: 1.6;
  }
  @media (prefers-color-scheme: dark) {
    .card { background: #161b22; border-color: #30363d; }
  }

  /* Big. Thumb-sized. This may be answered one-handed, outdoors, by someone with
     reading glasses in their other pocket. */
  .btns { display: flex; flex-direction: column; gap: 12px; margin-top: 26px; }
  button {
    font: inherit; font-weight: 700; font-size: 18px; border: 0; border-radius: 12px;
    padding: 18px; cursor: pointer; width: 100%;
  }
  .yes { background: #1a7f37; color: #fff; }
  .no  { background: transparent; color: #b00; border: 1.5px solid #d0a0a0; }
  button:disabled { opacity: .45; }

  .note { color: #6a737d; font-size: 13px; margin-top: 22px; line-height: 1.5; }
  .done { text-align: center; padding: 30px 0; }
  .done .mark { font-size: 46px; line-height: 1; }
  .done h2 { font-size: 20px; margin: 14px 0 6px; }
  .err { color: #b00; }
  textarea {
    width: 100%; font: inherit; font-size: 16px; padding: 12px; border-radius: 10px;
    border: 1px solid #d8dee4; margin-top: 12px; background: transparent; color: inherit;
  }
</style>
</head>
<body>
<div id="root">Loading…</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// Injected at deploy time. The anon key is public by design -- see the comment
// at the top of this file.
const SUPABASE_URL = '__SUPABASE_URL__';
const ANON_KEY = '__ANON_KEY__';

const supabase = createClient(SUPABASE_URL, ANON_KEY);
const root = document.getElementById('root');
const token = new URLSearchParams(location.search).get('t');

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

function screen(html) { root.innerHTML = html; }

function done(mark, title, sub) {
  // Once they have answered, there is nothing left to do here. No upsell, no
  // "create an account to see more" -- they did the contractor a favour and they
  // get to leave.
  screen(`<div class="done"><div class="mark">${mark}</div>
    <h2>${esc(title)}</h2><p class="note">${esc(sub)}</p></div>`);
}

async function load() {
  if (!token) { done('⚠️', 'This link is incomplete', 'Ask for the link again.'); return; }

  const { data, error } = await supabase.rpc('confirmation_fetch', { p_token: token });
  if (error) {
    // Never blame the reader for a network they do not control.
    done('⚠️', 'Could not load this', 'Check your connection and open the link again.');
    return;
  }

  if (data.status === 'not_found') {
    done('⚠️', 'This link is not valid', 'It may have been mistyped. Ask for a new one.');
    return;
  }
  if (data.status === 'expired') {
    done('⏰', 'This link has expired', 'Ask for a new one — nothing is lost.');
    return;
  }
  if (data.status === 'already_answered') {
    const when = data.answered_at ? new Date(data.answered_at).toLocaleString() : '';
    // Single-use, and honest about it: their first answer stands, and we show it
    // rather than quietly letting them answer twice.
    done(data.answered_action === 'confirmed' ? '✅' : '✋',
      `You already ${data.answered_action === 'confirmed' ? 'confirmed' : 'declined'} this`,
      when ? `Answered ${when}. Your answer stands.` : 'Your answer stands.');
    return;
  }

  render(data);
}

function render(d) {
  const verb = d.kind === 'confirm' ? 'confirm' : 'acknowledge';
  screen(`
    <div class="who">For ${esc(d.counterparty)}</div>
    <h1>Please read this and ${verb} it.</h1>
    <div class="card">${esc(d.shown_content)}</div>
    <div class="btns">
      <button class="yes" id="yes">Yes — that's right</button>
      <button class="no" id="no">No — that's not right</button>
    </div>
    <p class="note">
      Your answer is recorded with the date and time, and the contractor is told.
      You do not need an account. Anyone with this link can answer it.
    </p>`);

  document.getElementById('yes').onclick = () => answer('confirmed');
  document.getElementById('no').onclick = () => {
    // A decline without a reason starts an argument; a decline WITH one starts a
    // conversation. Optional, because demanding an explanation to say "no" is how
    // you get no answer at all.
    screen(`
      <h1>What's wrong with it?</h1>
      <div class="card">${esc(d.shown_content)}</div>
      <textarea id="note" rows="3" placeholder="Optional — what should it say instead?"></textarea>
      <div class="btns">
        <button class="no" id="send">Send my answer</button>
        <button class="yes" id="back" style="background:#6a737d">Back</button>
      </div>`);
    document.getElementById('send').onclick = () =>
      answer('declined', document.getElementById('note').value);
    document.getElementById('back').onclick = () => render(d);
  };
}

async function answer(action, note) {
  document.querySelectorAll('button').forEach((b) => (b.disabled = true));
  const { data, error } = await supabase.rpc('confirmation_respond', {
    p_token: token, p_action: action, p_note: note || null,
    // An identity SIGNAL, not identity proof. Named honestly in the schema and
    // named honestly here.
    p_user_agent: navigator.userAgent,
  });

  if (error) {
    // The answer did NOT land. Say so, and let them retry -- a silent failure here
    // means the contractor waits for a reply that is never coming.
    screen(`<div class="done"><div class="mark err">⚠️</div>
      <h2>That didn't send</h2>
      <p class="note">Nothing was recorded. Please tap again.</p>
      <div class="btns"><button class="yes" onclick="location.reload()">Try again</button></div>
      </div>`);
    return;
  }

  if (data.status === 'already_answered') {
    done('✅', 'Already answered', 'Your first answer stands.');
    return;
  }
  done(action === 'confirmed' ? '✅' : '✋',
    action === 'confirmed' ? 'Thank you — confirmed' : 'Thank you — sent',
    'The contractor has your answer. You can close this page.');
}

load();
</script>
</body>
</html>
