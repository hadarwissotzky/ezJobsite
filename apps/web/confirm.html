<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Approval</title>
<!--
  The no-login approval page — REQ-VAL1/2/3/8, and the client-facing REPORT.

  WHO IS READING THIS: a homeowner or a GC standing in a doorway, on their own
  phone, who has never heard of this app and will never make an account for it.
  They tapped a link a contractor texted them. If this page asks them to sign up,
  install anything, or work out what a "disposition" is, the contractor does not
  get their answer and the job stops. REQ-VAL3's no-login rule is not a
  convenience -- it is the only reason this loop closes at all.

  WHAT IT SHOWS (2026-07-20): for an EXTRA, the money is the report. The page now
  renders the priced approval -- who is asking, the scope, the FIXED PRICE, the
  running total already approved on the job, and a type-your-name-to-sign action.
  Every value is FROZEN at send (confirmation_fetch returns exactly what was
  stored): the price shown here is the price signed here. It cannot drift from the
  binding record, because the record is what it reads.

  WHY THIS IS A STATIC FILE IN A STORAGE BUCKET, and not an Edge Function:
  the page is inert. Every value it displays comes from confirmation_fetch(token),
  already granted to anon. There is no server logic to host.

  THE ANON KEY IS PUBLIC BY DESIGN. It identifies the project; RLS plus the RPC
  grants are what protect the data. anon can reach exactly two functions, no table.

  THE TOKEN IS THE CREDENTIAL. Whoever holds the link can answer. That is the trade
  REQ-VAL3 makes deliberately, stated plainly rather than dressed up.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0D0F12; --paper:#FAFAF8; --card:#FFFFFF; --orange:#FF5A00;
    --steel:#5C6570; --line:#E4E5E1; --approve:#0E8A4C; --caution:#F5B000; --danger:#C6281C;
    --disp:'Barlow Condensed', 'Arial Narrow', sans-serif;
    --body:'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--body); font-size: 17px; line-height: 1.5;
    margin: 0; padding: 0 0 40px; background: var(--paper); color: var(--ink);
    max-width: 480px; margin-inline: auto; min-height: 100vh;
  }
  .wrap { padding: 0 16px; }

  /* Branded header — who is asking + which job. */
  .brand { display: flex; align-items: center; gap: 12px; padding: 22px 16px 14px; }
  .logo {
    width: 46px; height: 46px; border-radius: 12px; background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--disp); font-weight: 700; font-size: 18px; letter-spacing: .5px; flex: none;
  }
  .cn { font-family: var(--disp); font-weight: 700; font-size: 20px; text-transform: uppercase; letter-spacing: .3px; line-height: 1.1; }
  .cs { font-size: 13.5px; color: var(--steel); margin-top: 2px; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 18px; margin-bottom: 12px;
  }
  .kicker { font-family: var(--disp); font-weight: 600; font-size: 13px; letter-spacing: .14em; text-transform: uppercase; color: var(--orange); }
  .title { font-family: var(--disp); font-weight: 700; font-size: 26px; line-height: 1.12; text-transform: uppercase; letter-spacing: .3px; margin: 6px 0 0; }
  .scope { font-size: 16px; color: #26292e; margin-top: 10px; line-height: 1.55; }

  .price { display: flex; justify-content: space-between; align-items: baseline; }
  .pl { font-family: var(--disp); font-weight: 600; font-size: 13px; letter-spacing: .13em; text-transform: uppercase; color: var(--steel); }
  .pv { font-family: var(--disp); font-weight: 700; font-size: 40px; letter-spacing: .5px; font-variant-numeric: tabular-nums; }
  .clause { font-size: 13.5px; color: var(--steel); margin-top: 8px; line-height: 1.5; }
  .totals { border-top: 1px solid var(--line); margin-top: 14px; padding-top: 12px; }
  .trow { display: flex; justify-content: space-between; font-size: 14.5px; padding: 3px 0; color: var(--steel); }
  .trow b { color: var(--ink); font-family: var(--disp); font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }

  /* Frozen legal wording, available but not shouting. */
  .exact { margin-top: 10px; }
  .exact summary { font-size: 13px; color: var(--steel); cursor: pointer; }
  .exact .doc { white-space: pre-wrap; background: #F3F4F2; border: 1px solid var(--line); border-radius: 10px; padding: 12px; font-size: 13.5px; line-height: 1.55; margin-top: 8px; color: #26292e; }

  /* Actions. Big, thumb-sized — answered one-handed, outdoors. */
  .sign { width: 100%; font-family: var(--body); font-size: 17px; padding: 15px 16px; border: 1.5px solid var(--line); border-radius: 12px; background: #fff; color: var(--ink); margin-bottom: 10px; }
  .sign:focus { outline: none; border-color: var(--ink); }
  button {
    font-family: var(--disp); font-weight: 700; font-size: 20px; letter-spacing: .04em; text-transform: uppercase;
    border: 0; border-radius: 14px; padding: 17px; cursor: pointer; width: 100%; min-height: 60px;
  }
  .approve { background: var(--approve); color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .approve:disabled { opacity: .4; }
  .ghost { background: none; color: var(--steel); font-size: 16px; margin-top: 6px; }
  .decline { background: none; color: var(--danger); border: 1.5px solid #E4C4C4; }
  .recordnote { font-size: 12px; color: var(--steel); text-align: center; margin-top: 12px; line-height: 1.5; }

  textarea { width: 100%; font-family: var(--body); font-size: 16px; padding: 12px; border-radius: 12px; border: 1.5px solid var(--line); background: #fff; color: var(--ink); margin: 10px 0; min-height: 88px; resize: none; }

  /* Legacy plain-confirm fallback (no price). */
  .plaincard { white-space: pre-wrap; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; font-size: 16.5px; line-height: 1.6; }
  h1.plain { font-size: 21px; margin: 4px 0 16px; line-height: 1.3; }
  .who { font-size: 14px; color: var(--steel); margin-bottom: 4px; }
  .btns { display: flex; flex-direction: column; gap: 12px; margin-top: 22px; }
  .yes { background: var(--approve); color: #fff; }
  .no { background: none; color: var(--danger); border: 1.5px solid #E4C4C4; }

  /* Terminal screens. */
  .done { text-align: center; padding: 46px 22px; }
  .done .mark { font-size: 52px; line-height: 1; }
  .done h2 { font-family: var(--disp); font-weight: 700; text-transform: uppercase; letter-spacing: .3px; font-size: 26px; margin: 16px 0 8px; }
  .done p { color: var(--steel); font-size: 15.5px; line-height: 1.55; margin: 0; }
  .err { color: var(--danger); }
</style>
</head>
<body>
<div id="root"><div class="done"><div class="mark">·</div><p>Loading…</p></div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// Injected at deploy time. The anon key is public by design (see the top comment).
const SUPABASE_URL = '__SUPABASE_URL__';
const ANON_KEY = '__ANON_KEY__';

const supabase = createClient(SUPABASE_URL, ANON_KEY);
const root = document.getElementById('root');
// The link may arrive either way: ?t=TOKEN (works on any static host with no
// rewrite) or a pretty /c/TOKEN path (needs a host rewrite). Accept both so the
// choice of host never silently breaks every link.
const token = new URLSearchParams(location.search).get('t')
  || (location.pathname.match(/\/c\/([^/?#]+)/) || [])[1] || null;

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

// Integer cents -> "$1,850". Money never becomes a float here either.
const usd = (cents) => {
  if (cents == null) return '';
  const s = Math.abs(cents).toString().padStart(3, '0');
  const whole = s.slice(0, -2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return '$' + whole + '.' + s.slice(-2);
};
// Initials for the logo tile, from the company name.
const initials = (name) => String(name || '')
  .split(/\s+/).filter(Boolean).slice(0, 2).map((w) => w[0]).join('').toUpperCase() || '•';

function screen(html) { root.innerHTML = html; }
function done(mark, title, sub) {
  screen(`<div class="done"><div class="mark">${mark}</div>
    <h2>${esc(title)}</h2><p>${esc(sub)}</p></div>`);
}

async function load() {
  if (!token) { done('⚠️', 'This link is incomplete', 'Ask for the link again.'); return; }

  const { data, error } = await supabase.rpc('confirmation_fetch', { p_token: token });
  if (error) { done('⚠️', 'Could not load this', 'Check your connection and open the link again.'); return; }

  if (data.status === 'not_found') { done('⚠️', 'This link is not valid', 'It may have been mistyped. Ask for a new one.'); return; }
  if (data.status === 'expired') { done('⏰', 'This link has expired', 'Ask for a new one — nothing is lost.'); return; }
  if (data.status === 'already_answered') {
    const when = data.answered_at ? new Date(data.answered_at).toLocaleString() : '';
    const who = data.signed_name ? ` by ${data.signed_name}` : '';
    const approved = data.answered_action === 'confirmed';
    done(approved ? '✅' : '✋',
      approved ? `Already approved${who ? ' — signed' + who.slice(3) : ''}` : 'Already answered',
      when ? `Answered ${when}. Your answer stands.` : 'Your answer stands.');
    return;
  }
  // A price present means this is a priced approval; otherwise the legacy confirm.
  (data.amount_cents != null) ? renderPriced(data) : renderPlain(data);
}

function renderPriced(d) {
  const company = d.company_name || 'Your contractor';
  const priced = usd(d.amount_cents);
  const priorApproved = (d.approved_running_cents != null && d.approved_running_cents > 0)
    ? `<div class="trow"><span>Extras you've approved on this job</span><span class="money">${esc(usd(d.approved_running_cents))}</span></div>` : '';
  const nte = (d.nte_cents != null)
    ? `<div class="clause">Not to exceed ${esc(usd(d.nte_cents))}.</div>` : '';

  screen(`
    <div class="brand">
      <div class="logo">${esc(initials(company))}</div>
      <div>
        <div class="cn">${esc(company)}</div>
        <div class="cs">${esc(d.job_label || '')}</div>
      </div>
    </div>
    <div class="wrap">
      <div class="card">
        <div class="kicker">Approval requested</div>
        <div class="title">${esc(d.scope_title || 'Extra work')}</div>
        <div class="scope">This is an extra, outside the original scope. Please review the price and approve before the work goes ahead.</div>
      </div>

      <div class="card">
        <div class="price"><span class="pl">Fixed price</span><span class="pv">${esc(priced)}</span></div>
        <div class="clause">This work is outside the contracted scope and is billed as an extra. Nothing proceeds until you approve.</div>
        ${nte}
        <div class="totals">
          <div class="trow"><span>This request</span><b>${esc(priced)}</b></div>
          ${priorApproved}
        </div>
        <details class="exact">
          <summary>See the exact wording</summary>
          <div class="doc">${esc(d.shown_content)}</div>
        </details>
      </div>

      <input class="sign" id="name" placeholder="Type your full name to sign" autocomplete="name">
      <button class="approve" id="approve" disabled>✓ Approve — ${esc(priced)}</button>
      <button class="ghost" id="ask">Ask a question instead</button>
      <p class="recordnote">Your response, your name, and the date &amp; time become part of the project record. No account needed.</p>
    </div>`);

  const nameEl = document.getElementById('name');
  const approveEl = document.getElementById('approve');
  nameEl.addEventListener('input', () => { approveEl.disabled = nameEl.value.trim().length < 2; });
  approveEl.onclick = () => answer('confirmed', null, nameEl.value.trim());
  document.getElementById('ask').onclick = () => askQuestion(d, false);
}

// Decline / question path — optional reason. Demanding an explanation to say "not
// yet" is how you get no answer at all, so the note is optional.
function askQuestion(d, priced) {
  screen(`
    <div class="wrap" style="padding-top:24px">
      <h1 class="plain">What's your question?</h1>
      <textarea id="note" placeholder="Optional — what would you like to ask or change?"></textarea>
      <div class="btns">
        <button class="decline" id="send">Send to ${esc(d.company_name || 'the contractor')}</button>
        <button class="ghost" id="back">Back</button>
      </div>
    </div>`);
  document.getElementById('send').onclick = () =>
    answer('declined', document.getElementById('note').value, null);
  document.getElementById('back').onclick = () => (d.amount_cents != null ? renderPriced(d) : renderPlain(d));
}

// Legacy no-price confirmation (a decision, no cost change). Kept working.
function renderPlain(d) {
  const verb = d.kind === 'confirm' ? 'confirm' : 'acknowledge';
  screen(`
    <div class="wrap" style="padding-top:24px">
      <div class="who">For ${esc(d.counterparty)}</div>
      <h1 class="plain">Please read this and ${verb} it.</h1>
      <div class="plaincard">${esc(d.shown_content)}</div>
      <input class="sign" id="name" placeholder="Type your full name to sign" autocomplete="name">
      <div class="btns">
        <button class="yes" id="yes" disabled>Yes — that's right</button>
        <button class="no" id="no">No — that's not right</button>
      </div>
      <p class="recordnote">Your answer, your name, and the date &amp; time become part of the project record. No account needed.</p>
    </div>`);
  // A Decision is signed like any other item (PRD R10). It carries no money, but a
  // confirmed spec — "the vanity is 34 inches" — is exactly what a rework argument
  // turns on months later, so it is worth the same signature as a priced extra.
  // Saying NO still needs no name: identity is not the price of declining.
  const plainName = document.getElementById('name');
  const yesEl = document.getElementById('yes');
  plainName.addEventListener('input', () => { yesEl.disabled = plainName.value.trim().length < 2; });
  yesEl.onclick = () => answer('confirmed', null, plainName.value.trim());
  document.getElementById('no').onclick = () => askQuestion(d, false);
}

async function answer(action, note, name) {
  document.querySelectorAll('button').forEach((b) => (b.disabled = true));
  const { data, error } = await supabase.rpc('confirmation_respond', {
    p_token: token, p_action: action, p_note: note || null,
    p_user_agent: navigator.userAgent,   // an identity SIGNAL, not proof.
    p_signed_name: name || null,
  });

  if (error) {
    // The database refuses an unsigned priced approval (210_approval_signature.sql).
    // A normal reader cannot reach this — the button stays disabled until a name is
    // typed — so this is a direct RPC call or a broken client. Say what is missing
    // rather than "that didn't send", which would be the wrong reason.
    const needsSignature =
      (error.message || '').includes('requires a typed signature') ||
      error.hint === 'signature_required';
    if (needsSignature) {
      screen(`<div class="done"><div class="mark err">✋</div>
        <h2>A name is required</h2>
        <p>Saying yes is a signature, so it has to be signed.
           Nothing was recorded. Open the link again and type your full name.</p>
        <div class="btns"><button class="yes" onclick="location.reload()">Open it again</button></div></div>`);
      return;
    }
    screen(`<div class="done"><div class="mark err">⚠️</div>
      <h2>That didn't send</h2>
      <p>Nothing was recorded. Please tap again.</p>
      <div class="btns"><button class="yes" onclick="location.reload()">Try again</button></div></div>`);
    return;
  }
  if (data.status === 'already_answered') { done('✅', 'Already answered', 'Your first answer stands.'); return; }
  done(action === 'confirmed' ? '✅' : '✋',
    action === 'confirmed' ? (name ? `Approved — signed ${name}` : 'Thank you — confirmed') : 'Thank you — sent',
    'The contractor has your answer. You can close this page.');
}

load();
</script>
</body>
</html>
